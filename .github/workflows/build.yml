name: Build Android Library

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Grant execute permission to gradlew
      # The user's project is missing the gradlew wrapper. 
      # This command will fail, but it's the standard step.
      # The user will need to add the wrapper to their project.
      run: chmod +x gradlew

    - name: Build with Gradle
      # The user's project is missing the gradlew wrapper.
      # This command will fail.
      run: ./gradlew build

    - name: Upload AAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vpnlib-release-aar
        # The path might need adjustment depending on the exact output of the build
        path: build/outputs/aar/*-release.aar
